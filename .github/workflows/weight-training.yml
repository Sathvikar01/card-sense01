name: Recommendation Weight Training

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Train recommendation weights
        run: npm run train:weights

      - name: Commit updated weights
        run: |
          git add src/config/recommendation-weights.json
          if git diff --cached --quiet; then
            echo "No weight changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh recommendation weights"
          git push
